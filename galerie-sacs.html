<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sacs à main & Pochettes — L'Atelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.0.8/400.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.0.8/700.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/jost@5.0.16/300.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/jost@5.0.16/400.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/jost@5.0.16/500.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FDF6F9;
      --sand:  #F9E4EE;
      --warm:  #E8B4CC;
      --rose:  #C4356A;
      --dark:  #1C0512;
      --muted: #7A3D5C;
      --gold:  #D4AF37;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--dark); line-height: 1.7; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 5%;
      background: rgba(253,246,249,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--sand);
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark); text-decoration: none; }
    .nav-logo span { color: var(--rose); }
    .nav-back {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--rose); }

    /* HERO */
    .page-hero {
      padding: 5rem 5% 3.5rem;
      text-align: center;
      background: linear-gradient(180deg, var(--sand) 0%, var(--cream) 100%);
      position: relative; overflow: hidden;
    }
    .page-hero::before {
      content: '';
      position: absolute; top: -30%; left: 50%; transform: translateX(-50%);
      width: 60vw; height: 60vw;
      background: radial-gradient(ellipse, rgba(196,53,106,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .page-eyebrow {
      font-size: 0.75rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--rose); font-weight: 500; margin-bottom: 0.8rem;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      color: var(--dark); line-height: 1.15; margin-bottom: 1rem;
    }
    .page-title em { font-style: italic; color: var(--rose); }
    .page-desc { color: var(--muted); font-weight: 300; font-size: 1.05rem; max-width: 50ch; margin: 0 auto 1.5rem; }
    .page-line { width: 3rem; height: 2px; background: var(--rose); margin: 0 auto; }

    /* FILTERS */
    .filters {
      display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center;
      padding: 2rem 5% 0;
    }
    .filter-btn {
      padding: 0.45rem 1.2rem;
      border: 1px solid var(--warm); border-radius: 50px;
      background: transparent; font-family: 'Jost', sans-serif;
      font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--rose); border-color: var(--rose);
      color: white;
    }

    /* GALLERY */
    .gallery-section { padding: 3rem 5% 6rem; }
    .folder-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; color: var(--dark);
      margin-bottom: 1.5rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--warm);
      display: flex; align-items: center; gap: 0.8rem;
    }
    .folder-title::before {
      content: ''; display: block;
      width: 1.5rem; height: 2px; background: var(--rose);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.2rem;
      margin-bottom: 3.5rem;
    }
    .gallery-item {
      position: relative;
	  border-radius: 6px;
	  overflow: hidden;
	  cursor: pointer;
	  background: var(--sand);
	  transition: transform 0.3s, box-shadow 0.3s;
	  display: flex;
	  flex-direction: column;
	  aspect-ratio: unset; /* on retire le ratio fixe */
    }
    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(196,53,106,0.18);
    }
    .gallery-item img {
      width: 100%;
	  aspect-ratio: 1/1; /* carré pour toutes les images */
	  object-fit: cover;
	  transition: transform 0.5s;
	  display: block;
    }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(28,5,18,0.5) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: flex-end; padding: 1rem;
    }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }
    .gallery-item-label {
      font-size: 0.75rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: white; font-weight: 500;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(28,5,18,0.92); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
      padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox-img {
      max-width: 90vw; max-height: 88vh;
      object-fit: contain; border-radius: 4px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: none; border: none; color: white;
      font-size: 2rem; cursor: pointer; line-height: 1;
      opacity: 0.7; transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(196,53,106,0.7); border: none;
      color: white; font-size: 1.5rem; cursor: pointer;
      width: 3rem; height: 3rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lightbox-nav:hover { background: var(--rose); }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }
    .lightbox-counter {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 0.82rem; letter-spacing: 0.1em;
    }

    /* LOADING */
    .loading {
      text-align: center; padding: 4rem; color: var(--muted);
      font-style: italic; font-size: 1rem;
    }
    .empty-folder {
      text-align: center; padding: 2rem;
      color: var(--muted); font-size: 0.9rem;
      border: 1px dashed var(--warm); border-radius: 6px;
      margin-bottom: 2rem;
    }

    /* CTA */
    .cta-bar {
      text-align: center; padding: 3rem 5% 5rem;
      border-top: 1px solid var(--sand);
    }
    .btn-primary {
      display: inline-block; padding: 0.9rem 2rem;
      background: var(--rose); color: var(--cream);
      text-decoration: none; font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      border-radius: 2px; transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: #8E1D4A; transform: translateY(-1px); }

    @media (max-width: 600px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .lightbox-nav { display: none; }
    }
    
    .gallery-item-title {
 background: rgba(196, 53, 106, 0.88);
  color: white;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-align: center;
  padding: 0.6rem 0.8rem;
  font-family: 'Jost', sans-serif;
  width: 100%;
  flex-shrink: 0;
}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">L'<span>Atelier</span></a>
  <a class="nav-back" href="index.html">← Retour au site</a>
</nav>

<div class="page-hero">
  <p class="page-eyebrow">Toute la collection</p>
  <h1 class="page-title">Sacs & <em>Pochettes</em></h1>
  <p class="page-desc">Découvrez toute notre collection de sacs à main et pochettes, chacun fait à la main avec des matières soigneusement choisies.</p>
  <div class="page-line"></div>
</div>

<div id="gallery-root" class="gallery-section">
  <div class="loading">Chargement des créations…</div>
</div>

<div class="cta-bar">
  <a href="index.html#contact" class="btn-primary">J'ai trouvé mon sac/pochette, envoyer un message →</a>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">‹</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">›</button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<script>
const FOLDERS = ["ressources/sacs", "ressources/pochettes"];
let allImages = [];
let currentIndex = 0;

async function loadFolder(folder) {
	  try {
	    const res = await fetch(folder + '/liste.json');
	    if (!res.ok) return [];
	    const data = await res.json();
	    return data.map(item => {
	      // Compatible ancien format (simple string) et nouveau format (objet)
	      if (typeof item === 'string') {
	        return { src: folder + '/' + item, titre: '' };
	      }
	      return { src: folder + '/' + item.fichier, titre: item.titre || '' };
	    });
	  } catch(e) {
	    return [];
	  }
	}

async function init() {
  const root = document.getElementById('gallery-root');
  root.innerHTML = '';

  for (const folder of FOLDERS) {
    const images = await loadFolder(folder);
    const folderName = folder.split('/').pop();
    const label = folderName.charAt(0).toUpperCase() + folderName.slice(1);

    const section = document.createElement('div');
    section.dataset.folder = folderName;

    const title = document.createElement('h2');
    title.className = 'folder-title';
    title.textContent = label;
    section.appendChild(title);

    if (images.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-folder';
      empty.innerHTML = `📂 Aucune image trouvée dans <code>${folder}/liste.json</code><br>
        <small>Ajoutez vos images dans ce dossier et créez un fichier <code>liste.json</code> listant les noms de fichiers.</small>`;
      section.appendChild(empty);
    } else {
      const grid = document.createElement('div');
      grid.className = 'gallery-grid';
      images.forEach((img, i) => {
        const globalIndex = allImages.length + i;
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `
        	  <img src="${img.src}" alt="${img.titre || label}" loading="lazy">
        	  <div class="gallery-item-overlay">
        	    <span class="gallery-item-label">${img.titre || label}</span>
        	  </div>
        	  ${img.titre ? `<div class="gallery-item-title">${img.titre}</div>` : ''}`;
        item.addEventListener('click', () => openLightbox(globalIndex));
        grid.appendChild(item);
      });
      section.appendChild(grid);
      allImages = allImages.concat(images);
    }
    root.appendChild(section);
  }
}

function openLightbox(index) {
  currentIndex = index;
  document.getElementById('lightbox').classList.add('open');
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function lightboxNav(dir) {
  currentIndex = (currentIndex + dir + allImages.length) % allImages.length;
  updateLightbox();
}

function updateLightbox() {
  document.getElementById('lightbox-img').src = allImages[currentIndex].src;
  document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + allImages.length;
}

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lightboxNav(1);
  if (e.key === 'ArrowLeft') lightboxNav(-1);
});

init();
</script>
</body>
</html>
